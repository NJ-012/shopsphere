<section class="shell auth-grid">
  <article class="summary-card">
    <p class="eyebrow">Demo credentials</p>
    <h1>Sign in</h1>
    <p>Customer: <code>customer@shopsphere.com</code> / <code>password123</code></p>
    <p>Vendor: <code>vendor@shopsphere.com</code> / <code>password123</code></p>
    <p>Admin: <code>admin@shopsphere.com</code> / <code>password123</code></p>
  </article>
  <form class="stack-form auth-card" ng-submit="vm.submit()">
    <label>Email<input type="email" ng-model="vm.form.email" required /></label>
    <label>Password<input type="password" ng-model="vm.form.password" required /></label>
    <p class="error-text" ng-if="vm.error">{{ vm.error }}</p>
    <button class="btn btn-primary" type="submit" ng-disabled="vm.loading">{{ vm.loading ? 'Signing in...' : 'Sign in' }}</button>
    <p>No account yet? <a href="#/register">Create one here</a>.</p>
  </form>
</section>

<section class="shell studio-layout">
  <article>
    <div class="section-header">
      <h1>Virtual studio</h1>
      <a href="#/saved-looks">Saved looks</a>
    </div>
    <form class="stack-form compact-form" ng-submit="vm.saveLook()">
      <label>Look title<input type="text" ng-model="vm.draft.title" /></label>
      <label>Mood<input type="text" ng-model="vm.draft.mood" /></label>
      <label>Background
        <select ng-model="vm.draft.background">
          <option value="sunset-grid">Sunset grid</option>
          <option value="gallery-white">Gallery white</option>
          <option value="midnight-velvet">Midnight velvet</option>
        </select>
      </label>
      <button class="btn btn-primary" type="submit">Save this look</button>
    </form>
    <div class="studio-catalog">
      <article class="mini-product" ng-repeat="product in vm.catalog track by product.prod_id">
        <img ng-src="{{ product.image_url }}" alt="{{ product.prod_name }}" />
        <div>
          <h3>{{ product.prod_name }}</h3>
          <button class="btn btn-outline btn-small" type="button" ng-click="vm.addToLook(product)">Add to board</button>
        </div>
      </article>
    </div>
  </article>
  <aside class="studio-board {{ vm.draft.background }}">
    <div class="board-header">
      <h2>{{ vm.draft.title }}</h2>
      <p>{{ vm.draft.mood }}</p>
    </div>
    <div class="look-items">
      <div class="look-chip" ng-repeat="item in vm.draft.items track by item.prod_id" draggable-item>
        <strong>{{ item.prod_name }}</strong>
        <button type="button" ng-click="vm.removeFromLook(item.prod_id)">x</button>
      </div>
    </div>
  </aside>
</section>

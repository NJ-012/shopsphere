<section class="shell">
  <div class="section-header">
    <h1>Wishlist</h1>
    <span>{{ vm.products.length }} saved items</span>
  </div>
  <div class="product-grid">
    <product-card ng-repeat="product in vm.products track by product.prod_id" product="product" mode="wishlist"></product-card>
  </div>
</section>

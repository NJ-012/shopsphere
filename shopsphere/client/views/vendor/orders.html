<section class="shell">
  <div class="section-header">
    <h1>Vendor order monitor</h1>
    <span>{{ vm.rows.length }} matching rows</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Order</th>
          <th>Date</th>
          <th>Product</th>
          <th>Qty</th>
          <th>Status</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="row in vm.rows track by $index">
          <td>#{{ row.order_id }}</td>
          <td>{{ row.created_at | date:'short' }}</td>
          <td>{{ row.product }}</td>
          <td>{{ row.quantity }}</td>
          <td>{{ row.status }}</td>
          <td>Rs. {{ row.amount }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>

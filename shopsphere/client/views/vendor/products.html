<section class="shell">
  <div class="section-header">
    <h1>Vendor products</h1>
    <span>{{ vm.products.length }} products</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Product</th>
          <th>Category</th>
          <th>Current price</th>
          <th>Stock</th>
          <th>Try-on</th>
        </tr>
      </thead>
      <tbody>
        <tr ng-repeat="product in vm.products track by product.prod_id">
          <td>{{ product.prod_name }}</td>
          <td>{{ product.cat_name }}</td>
          <td>Rs. {{ product.current_price }}</td>
          <td>{{ product.stock_qty }}</td>
          <td>{{ product.try_on_enabled ? 'Enabled' : 'Disabled' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
